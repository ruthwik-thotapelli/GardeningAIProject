<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gardening Chatbot</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #d0f0c0, #f0f9f2);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      width: 95%;
      max-width: 500px;
      height: 85vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    #chatbox {
      flex-grow: 1;
      overflow-y: auto;
      padding: 10px;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
    }

    .bot-msg, .user-msg {
      padding: 10px 15px;
      border-radius: 18px;
      margin: 6px 0;
      max-width: 80%;
      animation: fadeIn 0.3s ease-in-out;
    }

    .bot-msg {
      background-color: #e0f7e9;
      align-self: flex-start;
    }

    .user-msg {
      background-color: #d0e8ff;
      align-self: flex-end;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    #userInput {
      flex: 1;
      padding: 12px;
      border-radius: 15px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
      background: #f7f7f7;
    }

    #sendBtn {
      background-color: #34a853;
      color: white;
      border: none;
      padding: 0 16px;
      border-radius: 15px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #sendBtn:hover {
      background-color: #2e9449;
    }

    .typing-indicator {
      font-style: italic;
      color: #888;
      font-size: 13px;
      margin: 4px 0 0 8px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div id="chatbox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask about plants, space, or climate..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
